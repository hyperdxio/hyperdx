name: berg-oss
services:
  db:
    image: mongo:5.0.32-focal
    volumes:
      - .volumes/db:/data/db
    # WARNING: Exposing the database port will make it accessible from outside the container,
    # potentially allowing unauthorized access. If you uncomment the ports below,
    # ensure to secure your database (e.g., with strong authentication, proper network rules, and firewalls).
    # ports:
    #   - 27017:27017
    networks:
      - internal
  app:
    image: ${BERG_IMAGE_REPO:-berg}/${IMAGE_NAME_DOCKERHUB:-berg}:${IMAGE_VERSION:-latest}
    ports:
      - ${BERG_API_PORT}:${BERG_API_PORT}
      - ${BERG_APP_PORT}:${BERG_APP_PORT}
    environment:
      FRONTEND_URL: ${BERG_APP_URL}:${BERG_APP_PORT}
      BERG_API_PORT: ${BERG_API_PORT}
      BERG_APP_PORT: ${BERG_APP_PORT}
      BERG_APP_URL: ${BERG_APP_URL}
      BERG_LOG_LEVEL: ${BERG_LOG_LEVEL}
      MONGO_URI: 'mongodb://db:27017/berg'
      SERVER_URL: http://127.0.0.1:${BERG_API_PORT}
      EXPRESS_SESSION_SECRET: ${EXPRESS_SESSION_SECRET}
      # AWS Athena configuration (Berg query engine).
      # In EKS use IRSA; for non-IRSA deployments pass AWS_* env vars through
      # to the container via deploy-time secrets.
      ATHENA_REGION: ${ATHENA_REGION}
      ATHENA_WORKGROUP: ${ATHENA_WORKGROUP}
      ATHENA_OUTPUT_LOCATION: ${ATHENA_OUTPUT_LOCATION}
      ATHENA_SYNC_TIMEOUT_MS: ${ATHENA_SYNC_TIMEOUT_MS:-30000}
      ATHENA_RESULT_REUSE_TTL_MIN: ${ATHENA_RESULT_REUSE_TTL_MIN:-60}
    networks:
      - internal
    depends_on:
      - db
networks:
  internal:
