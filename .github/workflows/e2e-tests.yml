name: E2E Tests
on:
  workflow_call:

jobs:
  e2e-tests:
    name: E2E Tests - Shard ${{ matrix.shard }}
    # 8-core runner so the 4 Playwright workers (see playwright.config.ts) have
    # CPU headroom alongside the app + ClickHouse + MongoDB — 4 workers
    # over-subscribed the 4-vCPU ubuntu-24.04 runner and caused timeouts.
    runs-on: 8-core-playwright
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: E2E setup
        uses: ./.github/actions/e2e-setup

      - name: Run Playwright tests (full-stack mode)
        run: |
          cd packages/app
          yarn test:e2e --shard=${{ matrix.shard }}/4

      - name: E2E teardown
        if: always()
        uses: ./.github/actions/e2e-teardown
        with:
          artifact-suffix: ${{ matrix.shard }}
