name: Label external contributors

# Adds an `external` label to issues and PRs opened by external contributors
# (author is not an OWNER/MEMBER/COLLABORATOR of the repo). Pair it with the
# GitHub→Slack integration to get notified, e.g. in the target channel run:
#   /github subscribe hyperdxio/<repo> issues pulls +label:"external"
#
# This is a drop-in, per-repo workflow: copy it into each OSS repo. It uses the
# built-in GITHUB_TOKEN (no secrets) and creates the `external` label on first use.
#
# Uses pull_request_target (not pull_request) so the token is writable for PRs
# from forks — external PRs are always from forks, and pull_request from a fork
# gets a read-only token. Safe here because we never check out the PR's code;
# we only read event metadata and add a label.

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group:
    label-external-${{ github.event.issue.number ||
    github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const LABEL = 'external';
            const item = context.payload.issue ?? context.payload.pull_request;
            if (!item) return;

            // Skip draft PRs — they re-trigger via ready_for_review. (Issues have no draft.)
            if (item.draft) { core.info(`Skipping draft PR #${item.number}`); return; }

            // Skip bots (Dependabot, etc.).
            if (item.user?.type === 'Bot') { core.info(`Skipping bot ${item.user?.login}`); return; }

            // External == author has no write association with the repo.
            const INTERNAL = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            if (INTERNAL.includes(item.author_association)) {
              core.info(`#${item.number} by ${item.user?.login} is internal (${item.author_association}); skipping.`);
              return;
            }

            // Idempotent: if already labeled (e.g. on reopen), don't re-add / re-notify.
            if (item.labels?.some(l => l.name === LABEL)) { core.info(`#${item.number} already labeled.`); return; }

            const { owner, repo } = context.repo;

            // Ensure the label exists, tolerating the race where a concurrent (or
            // prior) run already created it — createLabel then returns 422.
            try {
              await github.rest.issues.createLabel({
                owner, repo, name: LABEL, color: 'D4C5F9',
                description: 'Opened by an external contributor',
              });
              core.info(`Created '${LABEL}' label.`);
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = already exists; anything else is real
            }

            await github.rest.issues.addLabels({ owner, repo, issue_number: item.number, labels: [LABEL] });
            core.info(`Labeled #${item.number} (${item.author_association}) as '${LABEL}'.`);
