name: Push Downstream
on:
  push:
    branches: [main]
# HDX-4235: cancel-in-progress must be false so every OSS main commit reliably
# dispatches downstream in commit order. Setting to true silently drops pending
# runs when commits land in quick succession — at least one push (f6a1d02 /
# PR #2250) was skipped this way, losing the EE downstream port. Queueing
# pending runs preserves order and prevents drops.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  push-downstream:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/github-script@v9
        env:
          ACTOR: ${{ github.actor }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          MESSAGE: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
        with:
          github-token: ${{ secrets.DOWNSTREAM_TOKEN }}
          script: |
            const { ACTOR, AUTHOR, MESSAGE, SHA } = process.env;
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: '${{ secrets.DOWNSTREAM_OWNER }}',
              repo: '${{ secrets.DOWNSTREAM_REPO_V2 }}',
              workflow_id: '${{ secrets.DOWNSTREAM_WORKFLOW_ID_V2 }}',
              ref: 'main',
              inputs: {
                actor: ACTOR,
                author: AUTHOR,
                message: MESSAGE,
                sha: SHA
              }
            });
