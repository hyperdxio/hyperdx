global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the OTel collector's internal metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Scrape ClickHouse metrics (if the /metrics handler is available)
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['ch-server:9363']
    metrics_path: '/metrics'

  # Note: the span-derived request metrics (with exemplars) arrive via
  # remote-write from the OTel collector, not a scrape — see the collector's
  # SPAN_METRICS_PROM_RW_ENDPOINT and the spanmetrics connector.
