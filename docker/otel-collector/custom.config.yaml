receivers:
  hostmetrics:
    collection_interval: 5s
    scrapers:
      cpu:
      load:
      memory:
      disk:
      filesystem:
      network:
# override the default processors
# processors:
#   batch:
#     send_batch_size: 10000
#     timeout: 10s
#   memory_limiter:
#     limit_mib: 2000
exporters:
  # fork data to otel-collector-json service (DEV ONLY)
  otlphttp/json:
    endpoint: http://otel-collector-json:4318
    headers:
      authorization: "super-secure-ingestion-api-key"
    compression: gzip
  # Prometheus remote_write to ClickHouse TimeSeries table
  prometheusremotewrite:
    endpoint: http://ch-server:9363/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
service:
  pipelines:
    metrics/hostmetrics:
      exporters:
        - clickhouse
      processors:
        - memory_limiter
        - batch
      receivers:
        - hostmetrics
    metrics/promql:
      exporters:
        - prometheusremotewrite
      processors:
        - memory_limiter
        - batch
      receivers:
        - hostmetrics
        - otlp/hyperdx
    traces/json:
      exporters:
        - otlphttp/json
      processors:
        - memory_limiter
        - batch
      receivers:
        - otlp/hyperdx
    # Metrics hasn't used JSON attributes yet
    # metrics/json:
    #   exporters:
    #     - otlphttp/json
    #   processors:
    #     - memory_limiter
    #     - batch
    #   receivers:
    #     - otlp/hyperdx
    logs/json:
      exporters:
        - otlphttp/json
      processors:
        - memory_limiter
        - batch
      receivers:
        - otlp/hyperdx
