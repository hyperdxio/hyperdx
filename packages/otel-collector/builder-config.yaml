      go.opentelemetry.io/collector/confmap/provider/envprovider
      v__OTEL_COLLECTOR_CORE_VERSION__
  - gomod:
      go.opentelemetry.io/collector/confmap/provider/fileprovider
      v__OTEL_COLLECTOR_CORE_VERSION__
  - gomod:
