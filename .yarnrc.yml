nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.13.0.cjs

npmMinimalAgeGate: 7d

npmPreapprovedPackages:
  - '@hyperdx/*'
  # Allow @clickhouse/client* pre-release (head) builds, which are published
  # for release validation and are newer than the npmMinimalAgeGate window.
  - '@clickhouse/*'
