name: hdx-ci
services:
  otel-collector:
    image: otel-collector:latest
    environment:
      CLICKHOUSE_ENDPOINT: 'tcp://ch-server:9000?dial_timeout=10s'
      HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE: ${HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE}
      HYPERDX_API_KEY: ${HYPERDX_API_KEY}
      HYPERDX_LOG_LEVEL: ${HYPERDX_LOG_LEVEL}
    ports:
      - '23133:13133'
    networks:
      - internal
    restart: on-failure
    depends_on:
      - ch-server
  ch-server:
    image: clickhouse:latest
    restart: on-failure
    ports:
      - 8123:8123
    networks:
      - internal
  postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0
    restart: on-failure
    environment:
      - POSTGRES_USER=ferretdb
      - POSTGRES_PASSWORD=ferretdb
      - POSTGRES_DB=postgres
    networks:
      - internal
  db:
    image: ghcr.io/ferretdb/ferretdb:2.7.0
    restart: on-failure
    ports:
      - 29999:29999
    environment:
      - FERRETDB_POSTGRESQL_URL=postgres://ferretdb:ferretdb@postgres:5432/postgres
    command: ['--listen-addr=:29999', '--no-auth']
    networks:
      - internal
    depends_on:
      - postgres
networks:
  internal:
    name: 'hyperdx-ci-internal-network'
