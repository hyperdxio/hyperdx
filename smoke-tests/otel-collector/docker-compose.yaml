name: otel-collector-smoke-tests

services:
  ch-server:
    extends:
      file: ../../docker-compose.ci.yml
      service: ch-server
    ports:
      - 9000:9000
      - 8123:8123
    networks:
      - internal
    healthcheck:
      test:
        wget -O /dev/null --no-verbose --tries=1 http://127.0.0.1:8123/ping ||
        exit 1
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
  otel-collector:
    build:
      context: ../..
      dockerfile: docker/otel-collector/Dockerfile
      target: dev
      args:
        OTEL_COLLECTOR_VERSION: ${OTEL_COLLECTOR_VERSION:-0.149.0}
        OTEL_COLLECTOR_CORE_VERSION: ${OTEL_COLLECTOR_CORE_VERSION:-1.55.0}
    environment:
      - CLICKHOUSE_ENDPOINT=tcp://ch-server:9000?dial_timeout=10s
      - CLICKHOUSE_PROMETHEUS_METRICS_ENDPOINT=ch-server:9363
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE=default
      - HYPERDX_LOG_LEVEL=info
      # Flush batches quickly so the smoke tests' short sleep (~1s) after
      # emitting data is enough for records to arrive in ClickHouse. The
      # production default (5s) is ClickHouse-friendly but too slow for
      # these tests, which emit a handful of records per case and assert
      # shortly afterwards.
      - HYPERDX_OTEL_BATCH_TIMEOUT=100ms
      # OPAMP_SERVER_URL is intentionally not set to run in standalone mode
    ports:
      - 4318:4318 # OTLP http receiver
      - 13133:13133 # health check
    networks:
      - internal
    depends_on:
      ch-server:
        condition: service_healthy

  otel-collector-json:
    build:
      context: ../..
      dockerfile: docker/otel-collector/Dockerfile
      target: dev
      args:
        OTEL_COLLECTOR_VERSION: ${OTEL_COLLECTOR_VERSION:-0.149.0}
        OTEL_COLLECTOR_CORE_VERSION: ${OTEL_COLLECTOR_CORE_VERSION:-1.55.0}
    environment:
      - CLICKHOUSE_ENDPOINT=tcp://ch-server:9000?dial_timeout=10s
      - CLICKHOUSE_PROMETHEUS_METRICS_ENDPOINT=ch-server:9363
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE=otel_json
      - HYPERDX_OTEL_EXPORTER_CLICKHOUSE_JSON_ENABLE=true
      - HYPERDX_LOG_LEVEL=info
      # See the note on the otel-collector service above for rationale.
      - HYPERDX_OTEL_BATCH_TIMEOUT=100ms
      # OPAMP_SERVER_URL is intentionally not set to run in standalone mode
    ports:
      - 14318:4318 # OTLP http receiver
    networks:
      - internal
    depends_on:
      ch-server:
        condition: service_healthy

  # Older ClickHouse (< 26.2) to test the compatibility schema (bloom filters
  # instead of full text indexes)
  ch-server-compat:
    image: clickhouse/clickhouse-server:25.12-alpine
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ../../docker/clickhouse/local/config.xml:/etc/clickhouse-server/config.xml
      - ../../docker/clickhouse/local/users.xml:/etc/clickhouse-server/users.xml
    ports:
      - 29000:9000
      - 28123:8123
    networks:
      - internal
    healthcheck:
      test:
        wget -O /dev/null --no-verbose --tries=1 http://127.0.0.1:8123/ping ||
        exit 1
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
  otel-collector-compat:
    build:
      context: ../..
      dockerfile: docker/otel-collector/Dockerfile
      target: dev
      args:
        OTEL_COLLECTOR_VERSION: ${OTEL_COLLECTOR_VERSION:-0.149.0}
        OTEL_COLLECTOR_CORE_VERSION: ${OTEL_COLLECTOR_CORE_VERSION:-1.55.0}
    environment:
      - CLICKHOUSE_ENDPOINT=tcp://ch-server-compat:9000?dial_timeout=10s
      - CLICKHOUSE_PROMETHEUS_METRICS_ENDPOINT=ch-server-compat:9363
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE=default
      - HYPERDX_LOG_LEVEL=info
      # OPAMP_SERVER_URL is intentionally not set to run in standalone mode
    ports:
      - 24318:4318 # OTLP http receiver
    networks:
      - internal
    depends_on:
      ch-server-compat:
        condition: service_healthy

networks:
  internal:
    name: 'smoke-test-internal-network'
